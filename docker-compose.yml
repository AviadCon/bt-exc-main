services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - MONGO_URI=mongodb://mongo:27017/mediadb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      - uploads:/tmp/uploads
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: ./app
    env_file:
      - path: .env
        required: false
    environment:
      - MONGO_URI=mongodb://mongo:27017/mediadb
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      - uploads:/tmp/uploads
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: celery -A worker worker --loglevel=info

  ui:
    build: ./ui
    ports:
      - "3000:3000"
    depends_on:
      app:
        condition: service_healthy

volumes:
  mongo_data:
  uploads:
